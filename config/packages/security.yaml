    access_control:
      # Allow anyone to GET
      - { path: ^/api, roles: PUBLIC_ACCESS, methods: [GET] }

      # Require JWT token for POST/PUT
      - { path: ^/api, roles: ROLE_ADMIN, methods: [POST, PUT, PATCH, DELETE] }

      # Allow login
      - { path: ^/api/login, roles: PUBLIC_ACCESS }

when@test:
  security:
    password_hashers:
      # By default, password hashers are resource intensive and take time. This is
      # important to generate secure password hashes. In tests however, secure hashes
      # are not important, waste resources and increase test times. The following
      # reduces the work factor to the lowest possible values.
      Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
        algorithm: auto
        cost: 4 # Lowest possible value for bcrypt
        time_cost: 3 # Lowest possible value for argon
        memory_cost: 10 # Lowest possible value for argon
    providers:
      users_in_memory:
        memory:
          users:
            admin:
              password: admin
              roles: [ROLE_USER, ROLE_ADMIN]
            user:
              password: user
              roles: [ROLE_USER]
    firewalls:
      in_memory:
        context: "back"
        pattern: ^/login/in-memory
        lazy: true
        provider: users_in_memory
        form_login:
          login_path: login.in_memory
          check_path: login.in_memory
          enable_csrf: true
          default_target_path: back.admin
        logout:
          path: app_logout
          target: login
      main:
        context: "back"
        lazy: true
        entry_point: App\Security\AuthenticationEntryPoint
        access_denied_handler: App\Security\AccessDeniedHandler
        logout:
          path: app_logout
          target: login

